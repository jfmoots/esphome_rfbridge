esphome:
  name: esphome-web-bafaac
  friendly_name: RF Bridge
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
web_server:

external_components:
  - source:
      type: git
      url: https://github.com/jfmoots/esphome_rfbridge
      ref: main
      path: esphome/components
    components: [rfbridge]
    refresh: 0s

rfbridge:
  id: rf_bridge
  cs_pin: GPIO5
  sck_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27
  stx882_data_pin: GPIO26
  srx882_data_pin: GPIO25
  srx882_enable_pin: GPIO33
  diagnostic_logging: true

button:
  - platform: template
    name: "RF Learn Sequence (CC1101)"
    on_press:
      - lambda: |-
          id(rf_bridge).start_rf_sequence_capture(1500);

  - platform: template
    name: "RF Clear Learned Command"
    on_press:
      - lambda: |-
          id(rf_bridge).clear_last_outprize_learned();

  - platform: template
    name: "RF Clear Sequence"
    on_press:
      - lambda: |-
          id(rf_bridge).clear_rf_sequence_capture();

  - platform: template
    name: "STX882 Replay Learned Raw Command"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_last_outprize_raw_capture_stx882();

  - platform: template
    name: "STX882 Replay Learned Sequence"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_rf_sequence_raw_stx882();

  - platform: template
    name: "STX882 Test Known Power Off"
    on_press:
      - lambda: |-
          id(rf_bridge).send_outprize_power_off_stx882();

  - platform: template
    name: "SRX882 Capture Raw Command"
    on_press:
      - lambda: |-
          id(rf_bridge).capture_srx882_raw(3000);

  - platform: template
    name: "SRX882 Clear Raw Capture"
    on_press:
      - lambda: |-
          id(rf_bridge).clear_srx882_capture();

  - platform: template
    name: "STX882 Replay SRX882 Raw Capture"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_srx882_capture_stx882();

  - platform: template
    name: "CC1101 Replay Learned Raw Command (Diagnostic)"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_last_outprize_raw_capture();

binary_sensor:
  - platform: template
    name: "RF Learned Command Available"
    lambda: |-
      return id(rf_bridge).has_learned_command();

  - platform: template
    name: "RF Sequence Available"
    lambda: |-
      return id(rf_bridge).has_sequence_capture();

  - platform: template
    name: "SRX882 Raw Capture Available"
    lambda: |-
      return id(rf_bridge).has_srx882_capture();

text_sensor:
  - platform: template
    name: "RF Last Learned Command"
    update_interval: 1s
    lambda: |-
      return id(rf_bridge).get_last_learned_summary();

  - platform: template
    name: "RF Last Sequence"
    update_interval: 1s
    lambda: |-
      return id(rf_bridge).get_sequence_summary();

  - platform: template
    name: "SRX882 Last Raw Capture"
    update_interval: 1s
    lambda: |-
      return id(rf_bridge).get_srx882_summary();
