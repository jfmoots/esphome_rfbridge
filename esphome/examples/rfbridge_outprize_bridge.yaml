esphome:
  name: esphome-web-bafaac
  friendly_name: RF Bridge
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
web_server:

external_components:
  - source:
      type: git
      url: https://github.com/jfmoots/esphome_rfbridge
      ref: main
      path: esphome/components
    components: [rfbridge]
    refresh: 0s

rfbridge:
  id: rf_bridge
  cs_pin: GPIO5
  sck_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27
  stx882_data_pin: GPIO26
  srx882_data_pin: GPIO25
  srx882_enable_pin: GPIO33
  diagnostic_logging: true

button:
  - platform: template
    name: "RF Recorder - Record Command"
    on_press:
      - lambda: |-
          id(rf_bridge).start_rf_recorder(3000);

  - platform: template
    name: "RF Recorder - Replay Command"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_rf_recording(1);

  - platform: template
    name: "RF Recorder - Clear Command"
    on_press:
      - lambda: |-
          id(rf_bridge).clear_rf_recording();

  - platform: template
    name: "RF Learn Sequence (CC1101 Diagnostic)"
    on_press:
      - lambda: |-
          id(rf_bridge).start_rf_sequence_capture(1500);

  - platform: template
    name: "CC1101 Replay Learned Raw Command (Diagnostic)"
    on_press:
      - lambda: |-
          id(rf_bridge).replay_last_outprize_raw_capture();

binary_sensor:
  - platform: template
    name: "RF Recording Available"
    lambda: |-
      return id(rf_bridge).has_rf_recording();

text_sensor:
  - platform: template
    name: "RF Recorder Status"
    update_interval: 1s
    lambda: |-
      return id(rf_bridge).get_rf_recorder_status();

  - platform: template
    name: "RF Recorded Command"
    update_interval: 1s
    lambda: |-
      return id(rf_bridge).get_rf_recording_summary();
