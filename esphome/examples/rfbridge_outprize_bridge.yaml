# RF Bridge v1.5.0 codec/API example.
# The ESP exposes a stable command/state contract; the future HA integration owns fan/cover entities.

rfbridge:
  id: rf_bridge
  cs_pin: GPIO5
  sck_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27
  stx882_data_pin: GPIO26
  srx882_data_pin: GPIO25
  srx882_enable_pin: GPIO33
  remote_id: 0x6CF
  diagnostic_logging: false

api:
  actions:
    - action: outprize_set_complete_state
      variables:
        powered: bool
        speed_percent: int
        direction_in: bool
        rain_enabled: bool
        # Transient action nibble: 0=none, 4=close, 8=open, 12=stop.
        vent_command: int
      then:
        - lambda: |-
            id(rf_bridge).set_outprize_complete_state(
              powered,
              static_cast<uint8_t>(speed_percent),
              direction_in ? esphome::rfbridge::OutprizeDirection::IN : esphome::rfbridge::OutprizeDirection::OUT,
              rain_enabled,
              static_cast<esphome::rfbridge::OutprizeVentCommand>(vent_command & 0x0C),
              1);

    - action: outprize_set_power
      variables:
        powered: bool
      then:
        - lambda: id(rf_bridge).set_outprize_power(powered, 1);

    - action: outprize_set_speed
      variables:
        speed_percent: int
      then:
        - lambda: id(rf_bridge).set_outprize_speed(static_cast<uint8_t>(speed_percent), 1);

    - action: outprize_set_direction
      variables:
        direction_in: bool
      then:
        - lambda: |-
            id(rf_bridge).set_outprize_direction(
              direction_in ? esphome::rfbridge::OutprizeDirection::IN : esphome::rfbridge::OutprizeDirection::OUT, 1);

    - action: outprize_set_rain
      variables:
        enabled: bool
      then:
        - lambda: id(rf_bridge).set_outprize_rain(enabled, 1);

    - action: outprize_set_vent
      variables:
        command: int
      then:
        - lambda: |-
            id(rf_bridge).set_outprize_vent(
              static_cast<esphome::rfbridge::OutprizeVentCommand>(command & 0x0C), 1);

binary_sensor:
  - platform: template
    name: "Outprize State Valid"
    lambda: return id(rf_bridge).has_outprize_state();

  - platform: template
    name: "Outprize Power Requested"
    lambda: return id(rf_bridge).get_outprize_power();

  - platform: template
    name: "Outprize Direction In"
    lambda: return id(rf_bridge).get_outprize_direction_in();

  - platform: template
    name: "Outprize Rain Enabled"
    lambda: return id(rf_bridge).get_outprize_rain();

sensor:
  - platform: template
    name: "Outprize Speed Requested"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 500ms
    lambda: return id(rf_bridge).get_outprize_speed();

  - platform: template
    name: "Outprize Vent Command"
    accuracy_decimals: 0
    update_interval: 500ms
    lambda: return id(rf_bridge).get_outprize_vent_command();

  - platform: template
    name: "Outprize State Revision"
    accuracy_decimals: 0
    update_interval: 500ms
    lambda: return id(rf_bridge).get_outprize_revision();

text_sensor:
  - platform: template
    name: "Outprize Command Source"
    update_interval: 500ms
    lambda: return id(rf_bridge).get_outprize_command_source();

  - platform: template
    name: "Outprize State"
    update_interval: 500ms
    lambda: return id(rf_bridge).get_outprize_state_summary();

  - platform: template
    name: "RF Bridge Capabilities"
    update_interval: 10s
    lambda: return id(rf_bridge).get_bridge_capabilities();

