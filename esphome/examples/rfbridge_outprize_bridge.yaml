esphome:
  name: rfbridge-outprize-test
  friendly_name: RF Bridge Outprize Test
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:

external_components:
  - source: github://jfmoots/esphome_rfbridge
    components: [rfbridge]

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

rfbridge:
  id: rf_bridge
  cs_pin: GPIO5
  gdo0_pin: GPIO4
