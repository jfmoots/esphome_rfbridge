esphome:
  name: rfbridge-outprize-tx-test
  friendly_name: RF Bridge Outprize TX Test

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://jfmoots/esphome_rfbridge
    components: [rfbridge]

rfbridge:
  id: rf_bridge
  cs_pin: GPIO5
  sck_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
  gdo0_pin: GPIO4
  diagnostic_logging: false

button:
  - platform: template
    name: Outprize Fan Off Awake
    on_press:
      - lambda: |-
          id(rf_bridge).send_outprize_fan_off(0x6CF);

  - platform: template
    name: Outprize Fan 60 OUT
    on_press:
      - lambda: |-
          id(rf_bridge).send_outprize(
            0x6CF,
            60,
            esphome::rfbridge::OutprizeDirection::OUT,
            false,
            esphome::rfbridge::OutprizeVentCommand::NONE
          );

  - platform: template
    name: Outprize Vent Open 60 OUT
    on_press:
      - lambda: |-
          id(rf_bridge).send_outprize(
            0x6CF,
            60,
            esphome::rfbridge::OutprizeDirection::OUT,
            false,
            esphome::rfbridge::OutprizeVentCommand::OPEN
          );

  - platform: template
    name: Outprize Power Off
    on_press:
      - lambda: |-
          id(rf_bridge).send_outprize_power_off(0x6CF);
