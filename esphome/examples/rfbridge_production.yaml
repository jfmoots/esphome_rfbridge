# RF Bridge v1.6.1 production example
#
# This is a complete reference configuration. Change the node name, Wi-Fi
# secrets, bridge_id values, board, and pins as required for your hardware.
#
# A production bridge intentionally exposes no protocol-specific entities.

esphome:
  name: esphome-web-bafaac
  friendly_name: RF Bridge
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  actions:
    # Addressed full-state Outprize command used by ha_outprize.
    - action: outprize_send_complete_state
      variables:
        remote_id: int
        powered: bool
        speed_percent: int
        direction_in: bool
        rain_enabled: bool
        vent_command: int
      then:
        - lambda: |-
            id(rf_bridge).send_outprize_complete_state(
              static_cast<uint32_t>(remote_id),
              powered,
              static_cast<uint8_t>(speed_percent),
              direction_in
                ? esphome::rfbridge::OutprizeDirection::IN
                : esphome::rfbridge::OutprizeDirection::OUT,
              rain_enabled,
              static_cast<esphome::rfbridge::OutprizeVentCommand>(
                vent_command & 0x0C),
              1);

    # Stops the fan without forcing the vent closed. The optional vent command
    # supports none (0), down (4), up (8), and stop (12).
    - action: outprize_send_fan_off_awake
      variables:
        remote_id: int
        vent_command: int
      then:
        - lambda: |-
            id(rf_bridge).send_outprize_fan_off(
              static_cast<uint32_t>(remote_id),
              static_cast<esphome::rfbridge::OutprizeVentCommand>(
                vent_command & 0x0C),
              1);

    # Variant-aware addressed commands used by ha_outprize v0.1.8+.
    # command_family is learned from each OEM remote (currently 0x40 or 0x60).
    - action: outprize_send_complete_state_family
      variables:
        remote_id: int
        command_family: int
        powered: bool
        speed_percent: int
        direction_in: bool
        rain_enabled: bool
        vent_command: int
      then:
        - lambda: |-
            id(rf_bridge).send_outprize_complete_state_family(
              static_cast<uint32_t>(remote_id),
              static_cast<uint8_t>(command_family),
              powered,
              static_cast<uint8_t>(speed_percent),
              direction_in
                ? esphome::rfbridge::OutprizeDirection::IN
                : esphome::rfbridge::OutprizeDirection::OUT,
              rain_enabled,
              static_cast<esphome::rfbridge::OutprizeVentCommand>(
                vent_command & 0x0C),
              1);

    - action: outprize_send_fan_off_awake_family
      variables:
        remote_id: int
        command_family: int
        vent_command: int
      then:
        - lambda: |-
            id(rf_bridge).send_outprize_fan_off_family(
              static_cast<uint32_t>(remote_id),
              static_cast<uint8_t>(command_family),
              static_cast<esphome::rfbridge::OutprizeVentCommand>(
                vent_command & 0x0C),
              1);

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:

external_components:
  - source:
      type: git
      url: https://github.com/jfmoots/esphome_rfbridge
      ref: v1.6.1
      path: esphome/components
    components:
      - rfbridge
    refresh: 0s

rfbridge:
  id: rf_bridge

  # CC1101 SPI and data pins
  cs_pin: GPIO5
  sck_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27

  # Direct ASK/OOK hardware
  stx882_data_pin: GPIO26
  srx882_data_pin: GPIO25
  srx882_enable_pin: GPIO33

  diagnostic_logging: false

  # Every complete valid Outprize frame is forwarded to Home Assistant.
  on_outprize_frame:
    then:
      - homeassistant.event:
          event: esphome.rfbridge_outprize_frame
          data:
            bridge_id: esphome-web-bafaac
          data_template:
            remote_id: "{{ rf_remote_id }}"
            low24: "{{ rf_low24 }}"
            powered: "{{ rf_powered }}"
            speed_percent: "{{ rf_speed_percent }}"
            direction_in: "{{ rf_direction_in }}"
            rain_enabled: "{{ rf_rain_enabled }}"
            vent_command: "{{ rf_vent_command }}"
            rssi_dbm: "{{ rf_rssi_dbm }}"
          variables:
            rf_remote_id: !lambda return remote_id;
            rf_low24: !lambda return low24;
            rf_powered: !lambda return powered;
            rf_speed_percent: !lambda return speed_percent;
            rf_direction_in: !lambda return direction_in;
            rf_rain_enabled: !lambda return rain_enabled;
            rf_vent_command: !lambda return vent_command;
            rf_rssi_dbm: !lambda return rssi_dbm;

  # Heartbeat, capabilities, firmware version, and boot-session reporting.
  on_bridge_status:
    then:
      - homeassistant.event:
          event: esphome.rfbridge_status
          data:
            bridge_id: esphome-web-bafaac
          data_template:
            boot_id: "{{ rf_boot_id }}"
            firmware_version: "{{ rf_firmware_version }}"
            capabilities: "{{ rf_capabilities }}"
          variables:
            rf_boot_id: !lambda return boot_id;
            rf_firmware_version: !lambda return firmware_version;
            rf_capabilities: !lambda return capabilities;
